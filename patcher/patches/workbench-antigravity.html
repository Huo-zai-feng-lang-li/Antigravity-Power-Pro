<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<meta http-equiv="Content-Security-Policy" content="
				default-src
					'none'
				;
				img-src
					'self'
					data:
					blob:
					vscode-remote-resource:
					vscode-managed-remote-resource:
					https:
				;
				media-src
					'self'
					data:
					https://127.0.0.1:*
					blob:
					https://www.gstatic.com/
				;
				frame-src
					'self'
					vscode-webview:
					data:
				;
				script-src
					'self'
					'unsafe-eval'
					blob:
				;
				style-src
					'self'
					'unsafe-inline'
					https://fonts.googleapis.com
				;
				connect-src
					'self'
					data:
					http://127.0.0.1:*
					http://jetski-unleash.corp.goog/
					http://antigravity-unleash.goog/
					https:
					ws:
				;
				font-src
					'self'
					vscode-remote-resource:
					vscode-managed-remote-resource:
					https://*.vscode-unpkg.net
					https://fonts.gstatic.com
				;
				require-trusted-types-for
					'script'
				;
				trusted-types
					amdLoader
					cellRendererEditorText
					collapsedCellPreview
					defaultWorkerFactory
					diffEditorWidget
					diffReview
					domLineBreaksComputer
					dompurify
					dompurifyMermaid
					editorGhostText
					editorViewLayer

					notebookRenderer
					stickyScrollViewLayer
					tokenizeToString
					notebookChatEditController
					richScreenReaderContent
					renderCodeBlock
					google#safe
				;
					default
				;
		" />
	<script>
		// Trusted Types Shim (Surgical V2)
		if (window.trustedTypes && !window.trustedTypes.defaultPolicy) {
			window.trustedTypes.createPolicy('default', {
				createHTML: (s) => s,
				createScriptURL: (s) => s,
				createScript: (s) => s,
			});
		}
	</script>

	<!-- Workbench CSS -->
	<link rel="stylesheet" href="../../../workbench/workbench.desktop.main.css">
	<link rel="stylesheet" href="./cascade-panel/cascade-panel.css">
