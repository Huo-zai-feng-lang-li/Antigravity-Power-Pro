name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: "patcher/pnpm-lock.yaml"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        working-directory: patcher
        run: pnpm install

      - name: Pre-build validation
        shell: pwsh
        run: |
          echo "Checking for UTF-8 BOM..."
          $filesWithBom = Get-ChildItem -Path . -Recurse -File -Exclude "node_modules", ".git", "target" | ForEach-Object {
              $bytes = Get-Content $_.FullName -AsByte -TotalCount 3
              if ($bytes -and $bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF) {
                  $_.FullName
              }
          }
          if ($filesWithBom) {
              Write-Error "UTF-8 BOM detected in the following files:`n$($filesWithBom -join '`n')"
              exit 1
          }
          echo "No BOM found."
          
          echo "Validating Cargo.toml metadata..."
          cd patcher/src-tauri
          cargo metadata --format-version 1 --no-deps > $null
          echo "Cargo metadata is valid."

      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: patcher
          tagName: v__VERSION__ # the action automatically replaces __VERSION__ with the app version
          releaseName: "Antigravity-Power-Pro v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false
          prerelease: false
